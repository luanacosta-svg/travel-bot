services:
  - type: web
    name: travel-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: MANAGER_EMAIL
        value: luana.costa@49educacao.com.br
      - key: ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
