services:
  - type: web
    name: travel-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: MANAGER_EMAIL
        value: luana.costa@49educacao.com.br
      - key: ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: travel-bot-monthly-report
    runtime: node
    schedule: "0 8 1 * *"
    buildCommand: echo "noop"
    startCommand: >
      node -e "
        fetch(
          process.env.BASE_URL + '/api/cron/monthly-report',
          { headers: { 'x-cron-secret': process.env.CRON_SECRET } }
        ).then(r => r.json()).then(console.log).catch(console.error)
      "
    envVars:
      - key: BASE_URL
        value: https://travel-bot-yrh3.onrender.com
      - key: CRON_SECRET
        sync: false
